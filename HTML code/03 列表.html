<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .box {
        width: 200px;
        height: 100px;

        padding: 20px;       /* 内边距 */
        border: 10px solid #3498db; /* 边框 */
        margin: 30px;        /* 外边距 */

        background-color: #f1c40f;
        color: white;
        text-align: center;
        line-height: 100px; /* 垂直居中文本 */
        border: 12px dotted #53a9ff;
    }


    body {
        background-color: #ecf0f1;
        font-family: Arial, sans-serif;
    }
        
    </style>
</head>
<body>
    <div class="box">内容区域</div>
</body>
</html>
