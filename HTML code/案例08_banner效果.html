<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .banner {
            height: 500px;
            color:#333;
            background-color: #f9e6f5;
            text-align: right;
            background-image: url(./案例08/叶瞬光\ \(2\).png);
            background-size: 20%;
            background-repeat: no-repeat;
            background-position: left bottom;
        }
        .banner>h2 {
            font-size:36px;
            font-weight: 400;
            line-height: 100px;
        }
        .banner>p {
            font-size:20px;
        }
        .banner>a {
            /* a是行内标签，无法设置宽高，先转换为行内块 */
            display:inline-block;
            width: 225px;
            height: 40px;
            color:#fff;
            background-color: #d95252;
            text-align: center;
            line-height: 40px;
            text-decoration: none;
        }
        .banner>a:hover {
            background-color: #e4393c;
        }
    </style>
</head>
<body>
    <div class="banner">
        <h2>叶瞬光世界第一可爱</h2>
        <p>她是青溟之主，一剑出，万籁寂，裂空斩雾如裁云，却也会在雨夜收伞，把檐下躲雨的小猫护进衣襟……</p>
        <a href="#">我爱叶瞬光</a>
    </div>   
</body>
</html>
