<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 清除默认样式 */
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        /* 主体颜色 */
        body {
            background-color: #f1f1f1;
        }
        /* 卡片盒子属性 */
        .card {
            width: 270px;
            height: 252px;
            padding:40px;
            margin:50px auto;

            text-align: center;
            background-color: #fff;  

            border-radius: 10px;         
        }
        /* 图片属性 */
        .card img {
            width: 80px;
            height:80px;

            border-radius: 50%;
        }
        /* 文本属性 */
        .card h4 {
            margin-top:20px;
            margin-bottom: 15px;
            font-weight:400;
            font-size:18px;
            color:#333;
        }
        .card p {
            font-size:14px;
            color:#555;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./案例09/收集素材 (43).png" alt="爱莉希雅">
        <h4>爱莉希雅Elysia</h2>
        <p>最初的律者——人之律者……</p>
    </div>
</body>
</html>
